<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wednesday - Legs & Core | Mass Gain</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f172a; color: white; min-height: 100vh; }
        nav { background: #1e293b; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ff4d4d; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 700; font-size: 22px; color: #ff4d4d; }
        .back-btn { color: white; text-decoration: none; font-size: 14px; background: rgba(255,77,77,0.2); padding: 8px 15px; border-radius: 8px; border: 1px solid #ff4d4d; transition: 0.3s; }
        .header-section { text-align: center; padding: 50px 20px; background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.9)), url('https://images.unsplash.com/photo-1574680096145-d05b474e2155?auto=format&fit=crop&q=80'); background-size: cover; background-position: center; }
        .day-selector { display: flex; justify-content: center; gap: 12px; padding: 25px; background: #1e293b; overflow-x: auto; border-bottom: 1px solid #334155; }
        .day-link { text-decoration: none; background: #0f172a; border: 1px solid #334155; color: #94a3b8; padding: 12px 25px; border-radius: 12px; font-weight: 500; transition: 0.3s; }
        .day-link.active { background: #ff4d4d; color: white; border-color: #ff4d4d; box-shadow: 0 5px 15px rgba(255, 77, 77, 0.3); }
        .workout-list { max-width: 850px; margin: 40px auto; padding: 0 20px 20px; }
        .exercise-card { background: #1e293b; border-radius: 20px; padding: 25px; margin-bottom: 25px; display: flex; align-items: center; gap: 25px; border: 1px solid #334155; transition: 0.3s; }
        .exercise-card:hover { border-color: #ff4d4d; transform: translateY(-5px); }
        .exercise-img { width: 160px; height: 160px; border-radius: 15px; object-fit: cover; background: #2d3748; border: 2px solid #334155; }
        .exercise-info h3 { font-size: 22px; color: #ff4d4d; margin-bottom: 8px; }
        .stats-badge { display: inline-block; background: rgba(255, 77, 77, 0.1); padding: 5px 15px; border-radius: 8px; font-size: 14px; color: #ff4d4d; font-weight: 600; border: 1px solid rgba(255, 77, 77, 0.2); }
        .session-footer { max-width: 850px; margin: 0 auto 60px; padding: 0 20px; text-align: center; }
        .done-btn { background: #22c55e; color: white; border: none; padding: 18px 50px; border-radius: 12px; font-weight: 600; font-size: 18px; cursor: pointer; transition: 0.3s; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3); }
        @media (max-width: 700px) { .exercise-card { flex-direction: column; text-align: center; } .exercise-img { width: 100%; height: 200px; } }
    </style>
</head>
<body>
<nav><div class="logo">FITNESS GUIDER</div><a href="dashboard.html" class="back-btn">← Back</a></nav>
<section class="header-section"><h1>Wednesday: Legs & Core</h1></section>
<div class="day-selector">
    <a href="mon-gain.html" class="day-link">Mon</a>
    <a href="tue-gain.html" class="day-link">Tue</a>
    <a href="wed-gain.html" class="day-link active">Wed</a>
    <a href="thu-gain.html" class="day-link">Thu</a>
    <a href="fri-gain.html" class="day-link">Fri</a>
    <a href="sat-gain.html" class="day-link">Sat</a>
</div>
<div class="workout-list" id="workoutSession" data-type="Mass Gain" data-duration="70" data-kcal="650">
    <div class="exercise-card"><img src="https://images.unsplash.com/photo-1574680096145-d05b474e2155?w=400" class="exercise-img"><div><h3>1. Barbell Squats</h3><div class="stats-badge">4 Sets x 8 Reps</div></div></div>
    <div class="exercise-card"><img src="https://images.unsplash.com/photo-1534367957967-97509d432323?w=400" class="exercise-img"><div><h3>2. Leg Press</h3><div class="stats-badge">3 Sets x 12 Reps</div></div></div>
    <div class="exercise-card"><img src="https://images.unsplash.com/photo-1434682881908-b43d0467b798?w=400" class="exercise-img"><div><h3>3. Romanian Deadlifts</h3><div class="stats-badge">3 Sets x 10 Reps</div></div></div>
    <div class="exercise-card"><img src="https://images.unsplash.com/photo-1591948971350-383b9f81d50c?w=400" class="exercise-img"><div><h3>4. Leg Extensions</h3><div class="stats-badge">3 Sets x 15 Reps</div></div></div>
    <div class="exercise-card"><img src="https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=400" class="exercise-img"><div><h3>5. Hanging Leg Raises</h3><div class="stats-badge">3 Sets x 15 Reps</div></div></div>
    <div class="exercise-card"><img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=400" class="exercise-img"><div><h3>6. Calf Raises</h3><div class="stats-badge">4 Sets x 15 Reps</div></div></div>
</div>
<div class="session-footer"><button class="done-btn" onclick="submitWorkout()">✅ Complete Wednesday</button></div>
<script>
    function submitWorkout() {
        const session = document.getElementById('workoutSession');
        const payload = { type: session.getAttribute('data-type'), duration: session.getAttribute('data-duration'), kcal: session.getAttribute('data-kcal'), day: "Wednesday" };
        fetch('/api/save-workout', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
        .then(() => { alert("Wednesday Leg Day Logged!"); window.location.href = 'dashboard.html'; })
        .catch(() => { window.location.href = 'dashboard.html'; });
    }
</script>
</body>
</html>
