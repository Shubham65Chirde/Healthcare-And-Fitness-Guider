<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Fitness Guider</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }
        body{
            height:100vh;
            background:#0f172a;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .container{
    width:90%;
    max-width:800px;
    background:#1e293b;
    padding:40px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    color:white;
}
        h2{
            text-align:center;
            margin-bottom:25px;
            font-weight:600;
        }
        .form-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:20px;
        }
        .input-group{
            display:flex;
            flex-direction:column;
            position: relative;
            margin-bottom: 10px;
        }
        .input-group label{
            margin-bottom:6px;
            font-size:14px;
            color:#cbd5e1;
        }
        .input-group input,
        .input-group select{
            padding:10px;
            border-radius:8px;
            border:1px solid #334155;
            background:#0f172a;
            color:white;
            outline:none;
            transition:0.3s;
        }
        .input-group input:focus,
        .input-group select:focus{
            border-color:#ff4d4d;
        }
        .error-text {
            color: #ff4d4d;
            font-size: 11px;
            margin-top: 4px;
            height: 12px;
            visibility: hidden;
        }
        .input-group.error input {
            border-color: #ff4d4d;
        }
        .input-group.error .error-text {
            visibility: visible;
        }
        .full{
            grid-column:span 2;
        }
        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#ff4d4d;
            color:white;
            font-weight:500;
            cursor:pointer;
            transition:0.3s;
            margin-top: 10px;
        }
        button:hover{
            background:#e60000;
        }
        .bottom-text{
            text-align:center;
            margin-top:15px;
            font-size:14px;
        }
        .bottom-text a{
            color:#ff4d4d;
            text-decoration:none;
        }

        /* =========================
   MOBILE RESPONSIVE
   ========================= */

@media (max-width:768px){

    body{
        height:auto;
        padding:20px 0;
    }

    .container{
        width:95%;
        padding:25px;
        margin:20px auto;
    }

    .form-grid{
        grid-template-columns:1fr;
        gap:15px;
    }

    .full{
        grid-column:span 1;
    }

    h2{
        font-size:24px;
    }

    .input-group input,
    .input-group select{
        font-size:16px;
        padding:12px;
    }

    button{
        padding:14px;
    }

    .bottom-text{
        font-size:13px;
    }
}
    </style>
</head>
<body>

<div class="container">
    <h2>Create Your Account 🚀</h2>

    <form
            id="regForm"
            class="form-grid"
            action="https://stayfit-backend-7srv.onrender.com/register"
            method="POST">

        <div class="input-group">
            <label>Full Name</label>
            <input type="text" name="fullName" id="fullName">
            <small class="error-text">Name is required</small>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" name="email" id="email">
            <small class="error-text">Enter a valid email</small>
        </div>

        <div class="input-group">
            <label>Create Password</label>
            <input type="password" name="password" id="password">
            <small class="error-text">Must be at least 6 characters</small>
        </div>

        <div class="input-group">
            <label>Gender</label>
            <select name="gender" id="gender">
                <option value="" disabled selected>Select</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
            <small class="error-text">Please select gender</small>
        </div>

        <div class="input-group">
            <label>Age</label>
            <input type="number" name="age" id="age">
            <small class="error-text">Age must be between 10 and 70</small>
        </div>

        <div class="input-group">
            <label>Current Weight (kg)</label>
            <input type="number" step="0.1" name="weight" id="weight">
            <small class="error-text">Enter valid weight</small>
        </div>

        <div class="input-group">
            <label>Height (cm)</label>
            <input type="number" step="0.1" name="height" id="height">
            <small class="error-text">Enter valid height</small>
        </div>

        <div class="input-group">
            <label>Fitness Goal</label>
            <select name="fitnessGoal" id="fitnessGoal">
                <option value="" disabled selected>Select Goal</option>
                <option value="Weight Loss">Weight Loss</option>
                <option value="Weight Gain">Weight Gain</option>
                <option value="Stay Fit">Stay Fit</option>
            </select>
            <small class="error-text">Please select a goal</small>
        </div>

        <div class="full">
            <button type="submit">Create Account →</button>
        </div>

    </form>

    <div class="bottom-text">
        Already have an account? <a href="login.html">Login</a>
    </div>

</div>

<script>
    const form = document.getElementById('regForm');

    form.addEventListener('submit', (e) => {
        let isValid = true;

        const fullName = document.getElementById('fullName');
        if(fullName.value.trim() === "") {
            setError(fullName);
            isValid = false;
        } else {
            setSuccess(fullName);
        }

        const email = document.getElementById('email');
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if(!emailRegex.test(email.value)) {
            setError(email);
            isValid = false;
        } else {
            setSuccess(email);
        }

        const password = document.getElementById('password');
        if(password.value.length < 6) {
            setError(password);
            isValid = false;
        } else {
            setSuccess(password);
        }

        const age = document.getElementById('age');
        if(age.value < 10 || age.value > 70 || age.value === "") {
            setError(age);
            isValid = false;
        } else {
            setSuccess(age);
        }

        const gender = document.getElementById('gender');
        if(gender.value === "") {
            setError(gender);
            isValid = false;
        } else {
            setSuccess(gender);
        }

        const weight = document.getElementById('weight');
        if(weight.value <= 0) {
            setError(weight);
            isValid = false;
        } else {
            setSuccess(weight);
        }

        const height = document.getElementById('height');
        if(height.value <= 0) {
            setError(height);
            isValid = false;
        } else {
            setSuccess(height);
        }

        const goal = document.getElementById('fitnessGoal');
        if(goal.value === "") {
            setError(goal);
            isValid = false;
        } else {
            setSuccess(goal);
        }

        if(!isValid) {
            e.preventDefault();
        }
    });

    function setError(input) {
        const group = input.parentElement;
        group.classList.add('error');
    }

    function setSuccess(input) {
        const group = input.parentElement;
        group.classList.remove('error');
    }
</script>

</body>
</html>
