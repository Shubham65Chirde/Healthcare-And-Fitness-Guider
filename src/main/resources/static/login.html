<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fitness Guider</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            height:100vh;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .login-card{
            width:400px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            padding:40px;
            border-radius:20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow:0 25px 50px rgba(0,0,0,0.5);
            color:white;
        }

        h2{
            text-align:center;
            margin-bottom:10px;
            font-size:28px;
        }

        p.subtitle{
            text-align:center;
            color:#94a3b8;
            font-size:14px;
            margin-bottom:30px;
        }

        .input-group{
            margin-bottom:20px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            font-size:13px;
            color:#cbd5e1;
        }

        .input-group input{
            width:100%;
            padding:12px 15px;
            border-radius:10px;
            border:1px solid #334155;
            background: rgba(15,23,42,0.6);
            color:white;
            outline:none;
            transition:0.3s;
        }

        .input-group input:focus{
            border-color:#ff4d4d;
            box-shadow:0 0 0 2px rgba(255,77,77,0.2);
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#ff4d4d;
            color:white;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
            margin-top:10px;
        }

        button:hover{
            background:#e60000;
            transform:translateY(-2px);
        }

        .bottom-link{
            text-align:center;
            margin-top:20px;
            font-size:14px;
            color:#94a3b8;
        }

        .bottom-link a{
            color:#ff4d4d;
            text-decoration:none;
            font-weight:500;
        }

        .error-msg{
            color:#ff4d4d;
            text-align:center;
            font-size:13px;
            margin-bottom:15px;
            display:none;
        }
    </style>
</head>
<body>

<div class="login-card">

    <h2>Welcome Back</h2>

    <p class="subtitle">
        Enter your details to continue your journey
    </p>

    <div id="errorBox" class="error-msg">
        Invalid email or password!
    </div>

    <form
            action="https://stayfit-backend-7srv.onrender.com/login"
            method="POST">

        <div class="input-group">
            <label>Email Address</label>
            <input
                    type="email"
                    name="email"
                    placeholder="name@example.com"
                    required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input
                    type="password"
                    name="password"
                    placeholder="••••••••"
                    required>
        </div>

        <button type="submit">
            Sign In
        </button>

    </form>

    <div class="bottom-link">
        New here?
        <a href="register.html">
            Create an account
        </a>
    </div>

</div>

<script>
    if(window.location.search.includes('error')){
        document.getElementById('errorBox').style.display = 'block';
    }
</script>

</body>
</html>
