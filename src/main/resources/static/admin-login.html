<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Fitness Guider</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f172a; height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }

        .login-card { background: #1e293b; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid #334155; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h2 { text-align: center; margin-bottom: 30px; color: #ff4d4d; font-size: 24px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #94a3b8; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: #ff4d4d; }

        .login-btn { width: 100%; padding: 12px; background: #ff4d4d; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 16px; margin-top: 10px; }
        .login-btn:hover { background: #e60000; transform: translateY(-2px); }

        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #94a3b8; text-decoration: none; font-size: 13px; transition: 0.3s; }
        .back-link a:hover { color: #ff4d4d; }

        #error-msg { color: #ef4444; font-size: 13px; text-align: center; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Admin Portal</h2>
    <div id="error-msg">Invalid Credentials!</div>

    <form id="adminLoginForm">
        <div class="form-group">
            <label>Admin Username</label>
            <input type="text" id="username" placeholder="Enter username" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="login-btn">Secure Login</button>
    </form>

    <div class="back-link">
        <a href="index.html">← Back to Site</a>
    </div>
</div>

<script>
    document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');

        fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: username, password: password })
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === "success") {
                window.location.href = "admin-panel.html";
            } else {
                errorMsg.style.display = "block";
                errorMsg.innerText = data.message;
            }
        })
        .catch(err => {
            errorMsg.style.display = "block";
            errorMsg.innerText = "Connection error with server";
        });
    });
</script>

</body>
</html>
